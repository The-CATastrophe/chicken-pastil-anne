<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code — Chicken Pastil-Anne</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- QRCode.js from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="qr-page-body">

  <div class="qr-card" id="qr-card">
    <!-- Logo icon -->
    <div style="display:flex;justify-content:center;margin-bottom:12px;">
      <div style="width:56px;height:56px;background:#c0392b;border-radius:50%;display:flex;align-items:center;justify-content:center;">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" width="32" height="32">
          <path d="M30 14c-2.5-2.5-6.5-2.5-9 0l-7 7c-2.5 2.5-2.5 6.5 0 9 1.25 1.25 2.9 1.88 4.5 1.88 1.6 0 3.25-.63 4.5-1.88l7-7c2.5-2.5 2.5-6.5 0-9z" fill="#fdf6ec"/>
          <path d="M16 35l-4 4" stroke="#fdf6ec" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="14" cy="37" r="2.5" fill="#e8a020"/>
        </svg>
      </div>
    </div>

    <div class="qr-brand">Chicken Pastil-Anne</div>
    <div class="qr-tagline">Tulog kana nakangiti kapa!</div>

    <div id="qr-canvas-wrap">
      <div id="qrcode"></div>
    </div>

    <div class="qr-label">Scan to order online</div>
    <div class="qr-url" id="qr-url-display"></div>

    <div class="qr-actions">
      <button class="qr-btn" id="download-btn" onclick="downloadQR()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download PNG
      </button>
      <button class="qr-btn outline" onclick="window.print()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
          <polyline points="6 9 6 2 18 2 18 9"/>
          <path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/>
          <rect x="6" y="14" width="12" height="8"/>
        </svg>
        Print
      </button>
      <a class="qr-btn outline" href="index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
        Back to Menu
      </a>
    </div>
  </div>

  <script>
    /* ── Generate QR ── */
    const siteURL = (() => {
      const url = window.location.href;
      return url.replace(/qr\.html.*$/, 'index.html');
    })();

    document.getElementById('qr-url-display').textContent = siteURL;

    const qr = new QRCode(document.getElementById('qrcode'), {
      text:          siteURL,
      width:         220,
      height:        220,
      colorDark:     '#1a0a04',
      colorLight:    '#ffffff',
      correctLevel:  QRCode.CorrectLevel.H
    });

    /* ── Download as PNG with label ── */
    function downloadQR() {
      setTimeout(() => {
        const qrImg = document.querySelector('#qrcode img') ||
                      document.querySelector('#qrcode canvas');
        if (!qrImg) { alert('QR not ready yet, please try again.'); return; }

        // Build a canvas with label
        const canvas  = document.createElement('canvas');
        canvas.width  = 300;
        canvas.height = 360;
        const ctx     = canvas.getContext('2d');

        // Background
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, 300, 360);

        // Label top
        ctx.fillStyle = '#c0392b';
        ctx.fillRect(0, 0, 300, 50);
        ctx.fillStyle = '#ffffff';
        ctx.font      = 'bold 16px serif';
        ctx.textAlign = 'center';
        ctx.fillText('Chicken Pastil-Anne', 150, 25);
        ctx.font      = '11px sans-serif';
        ctx.fillText('Tulog kana nakangiti kapa!', 150, 42);

        // QR image
        const drawQR = (src) => {
          const img  = new Image();
          img.onload = () => {
            ctx.drawImage(img, 40, 60, 220, 220);
            // Footer
            ctx.fillStyle = '#f5f5f5';
            ctx.fillRect(0, 295, 300, 65);
            ctx.fillStyle = '#555';
            ctx.font      = '10px sans-serif';
            ctx.fillText('Scan to order online', 150, 316);
            ctx.fillStyle = '#c0392b';
            ctx.font      = '9px sans-serif';
            const short = siteURL.length > 40 ? siteURL.slice(0,40)+'...' : siteURL;
            ctx.fillText(short, 150, 332);

            // Download
            const a  = document.createElement('a');
            a.download = 'ChickenPastilAnne-QR.png';
            a.href     = canvas.toDataURL('image/png');
            a.click();
          };
          img.src = src;
        };

        if (qrImg.tagName === 'CANVAS') {
          drawQR(qrImg.toDataURL());
        } else {
          drawQR(qrImg.src);
        }
      }, 200);
    }
  </script>
</body>
</html>
